name: Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.PASSWORD }}
          script: |
            cd /var/www/deploy
            dep deploy -o repository=${{vars.CRM_SCHEDULE_URL}} -o deploy_path=${{vars.CRM_SCHEDULE_PATH}} -o http_user=${{vars.CRM_SCHEDULE_USER}} -vvv
