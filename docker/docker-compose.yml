version: '3.0'

services:

    nginx:
        image: nginx:latest
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d
            - ../:/var/app/
        ports:
#            todo Временно !
            - 81:80
        depends_on:
            -   app

    app:
        build:
            context: .
            dockerfile: App/Dockerfile
        volumes:
            - ../:/var/app/
        depends_on:
            - db

    test-app:
        build:
            context: .
            dockerfile: App/Dockerfile
        volumes:
            - ../:/var/app/
            - ../.env.testing:/var/app/.env
        depends_on:
            - test-db

    test-db:
        image: postgres:latest
        environment:
            POSTGRES_DB: "test_schedule"
            POSTGRES_USER: "test_schedule"
            POSTGRES_PASSWORD: "root"
        ports:
            - 5433:5432
        volumes:
            -   test_pgsql_data:/var/lib/postgresql

    db:
        image: postgres:latest
        environment:
            POSTGRES_DB: "schedule"
            POSTGRES_USER: "schedule"
            POSTGRES_PASSWORD: "root"
        ports:
            - 5432:5432
        volumes:
            -   pgsql_data:/var/lib/postgresql

    pgadmin4:
        image: elestio/pgadmin:latest
        environment:
            PGADMIN_DEFAULT_EMAIL: 'fakysgg@gmail.com'
            PGADMIN_DEFAULT_PASSWORD: 'root'
        depends_on:
            - db
        ports:
            - "5050:80"

    redis:
        image: redis:latest
        ports:
            - "6379:6379"
        environment:
            - REDIS_USERNAME=schedule
            - REDIS_USER_PASSWORD=root
            - REDIS_PASSWORD=root
            - REDIS_PORT=6379
        volumes:
            - redis_data:/data
            - ../redis.conf:/usr/local/etc/redis/redis.conf

    rabbitmq:
        image: rabbitmq:3.8
        depends_on:
            - app
        ports:
            - "5672:5672"
            - "15672:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: schedule
            RABBITMQ_DEFAULT_PASS: root

volumes:
    rabbitmq_data:
        driver: local
    pgsql_data:
        driver: local
    test_pgsql_data:
        driver: local
    redis_data:
        driver: local
