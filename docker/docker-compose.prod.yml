version: '3.0'

services:

    nginx:
        image: nginx:latest
        volumes:
            - ./nginx/conf.d:/etc/nginx/conf.d
            - ../:/var/app/
        ports:
            - 80:80
        depends_on:
            -   app

    app:
        build:
            context: .
            dockerfile: App/Dockerfile
        volumes:
            - ../:/var/app/
            - /var/www/CrmSchedule/shared/storage:/var/app/storage
            - /var/www/CrmSchedule/shared/.env:/var/app/.env
        depends_on:
            - db

    db:
        image: postgres:latest
        environment:
            POSTGRES_DB: ${DB_DATABASE}
            POSTGRES_USER: ${DB_USERNAME}
            POSTGRES_PASSWORD: ${DB_PASSWORD}
        ports:
            - 5432:5432
        volumes:
            -   pgsql_data:/var/lib/postgresql

    pgadmin4:
        image: elestio/pgadmin:latest
        environment:
            PGADMIN_DEFAULT_EMAIL: 'fakysgg@gmail.com'
            PGADMIN_DEFAULT_PASSWORD: 'root'
        depends_on:
            - db
        ports:
            - "5050:80"

    redis:
        image: redis:latest
        ports:
            - "6379:6379"
        environment:
            - REDIS_USERNAME=${REDIS_USERNAME}
            - REDIS_USER_PASSWORD=${REDIS_PASSWORD}
            - REDIS_PASSWORD=${REDIS_PASSWORD}
            - REDIS_PORT=${REDIS_PORT}
        volumes:
            - redis_data:/data
            - ../redis.conf:/usr/local/etc/redis/redis.conf

    rabbitmq:
        image: rabbitmq:3.8
        depends_on:
            - app
        ports:
            - "5672:5672"
            - "15672:15672"
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        environment:
            RABBITMQ_DEFAULT_USER: schedule
            RABBITMQ_DEFAULT_PASS: root

volumes:
    rabbitmq_data:
        driver: local
    pgsql_data:
        driver: local
    redis_data:
        driver: local
